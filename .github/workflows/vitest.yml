name: Typescript Vitest

on:
  push:
    paths:
      - "src/**"
      - "types/**"
      - "vitest.config.ts"
      - "tsconfig.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "rolldown.config*.mjs"
      - "rolldown.config*.dts.mjs"
      - ".github/workflows/vitest.yml"

defaults:
  run:
    shell: bash

jobs:
  typescript-vitest:
    name: Typescript Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          npm install -g pnpm
          pnpm install

      - name: Run tests
        run: pnpm test
