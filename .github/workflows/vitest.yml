name: Typescript Vitest

on:
  push:
    paths:
      - "src/**"
      - "types/**"
      - "tests/**"
      - "vitest.config.ts"
      - "tsconfig.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "rolldown.config*.mjs"
      - "rolldown.config*.dts.mjs"
      - ".github/workflows/vitest.yml"

defaults:
  run:
    shell: bash

jobs:
  typescript-vitest:
    name: Typescript Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          npm install -g pnpm
          pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build package
        run: pnpm build

      - name: Check package contents
        run: npm pack --dry-run --ignore-scripts

      - name: Smoke test packed package
        run: pnpm smoke:package
